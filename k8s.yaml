apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homeclip-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeclip
  labels:
    app: homeclip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homeclip
  template:
    metadata:
      labels:
        app: homeclip
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: homeclip
          image: homeclip:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATA_DIR
              value: /data
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: homeclip-data
---
apiVersion: v1
kind: Service
metadata:
  name: homeclip
spec:
  type: ClusterIP
  selector:
    app: homeclip
  ports:
    - port: 8080
      targetPort: 8080
